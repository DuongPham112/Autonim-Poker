<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autonim_Poker</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Autonim_Poker</h1>
            <p class="subtitle">Automated Poker Animation Extension</p>
        </header>
        
        <main>
            <section class="control-panel">
                <h2>Controls</h2>
                
                <div class="control-group">
                    <label for="animationType">Animation Type:</label>
                    <select id="animationType">
                        <option value="deal">Deal Cards</option>
                        <option value="flip">Flip Cards</option>
                        <option value="shuffle">Shuffle Deck</option>
                        <option value="collect">Collect Cards</option>
                    </select>
                </div>
                
                <div class="control-group">
                    <label for="duration">Duration (seconds):</label>
                    <input type="number" id="duration" min="0.5" max="10" step="0.1" value="2.0">
                </div>
                
                <div class="control-group">
                    <label for="cardCount">Number of Cards:</label>
                    <input type="number" id="cardCount" min="1" max="52" value="5">
                </div>
                
                <button id="generateBtn" class="btn-primary">Generate Animation</button>
            </section>
            
            <section class="info-panel">
                <h2>Status</h2>
                <div id="statusMessage" class="status-message">
                    Ready to generate animations
                </div>
            </section>
        </main>
        
        <footer>
            <p>Version 1.0.0 | VibeCode</p>
        </footer>
    </div>
    
    <!-- Load CSInterface library -->
    <script src="../lib/CSInterface.js"></script>
    <!-- Load main application logic -->
    <script src="js/main.js"></script>
</body>
</html>
