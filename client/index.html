<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autonim-Poker</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <h1 class="logo">🎴 Autonim-Poker</h1>
                <span class="version">v1.0.0</span>
            </div>
            <div class="header-right">
                <div class="recording-indicator" id="recordingIndicator">
                    <span class="rec-dot"></span>
                    <span>REC</span>
                </div>
            </div>
        </header>

        <!-- Controls Bar -->
        <div class="controls-bar">
            <div class="controls-left">
                <button id="importDeckBtn" class="btn btn-secondary">
                    <span class="btn-icon">📁</span>
                    Import Deck
                </button>
                <button id="resetBtn" class="btn btn-danger">
                    <span class="btn-icon">🔄</span>
                    Reset
                </button>
            </div>
            <div class="controls-center">
                <div class="info-panel">
                    <span id="cardCount">Cards: 0</span>
                    <span class="separator">|</span>
                    <span id="keyframeCount">Keyframes: 0</span>
                </div>
            </div>
            <div class="controls-right">
                <button id="exportBtn" class="btn btn-primary btn-large">
                    <span class="btn-icon">🚀</span>
                    EXPORT TO AE
                </button>
            </div>
        </div>

        <!-- Poker Table -->
        <div class="poker-table-container">
            <div id="pokerTable" class="poker-table">
                <div class="table-center-line"></div>
                <div class="table-border"></div>
                <div id="cardArea" class="card-area">
                    <!-- Cards will be inserted here dynamically -->
                </div>
                <div class="table-instructions" id="tableInstructions">
                    <p>📁 Click <strong>Import Deck</strong> to load card images</p>
                    <p>🖱️ Drag cards to position them</p>
                    <p>⌨️ Hold <strong>SPACE + Drag</strong> to record motion</p>
                </div>
            </div>
        </div>

        <!-- Footer Status -->
        <footer class="footer">
            <div class="status-bar">
                <span id="statusMessage">Ready - Import a deck to start</span>
            </div>
            <div class="help-hint">
                <span>Space + Drag = Record</span>
            </div>
        </footer>
    </div>

    <!-- Hidden folder input -->
    <input type="file" id="folderInput" webkitdirectory directory multiple style="display: none;">

    <!-- Load CSInterface library -->
    <script src="../lib/CSInterface.js"></script>
    <!-- Load main application logic -->
    <script src="js/main.js"></script>
</body>
</html>
